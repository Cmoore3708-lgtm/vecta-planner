function showFatal(msg){var el=document.getElementById('fatal'); if(el){el.textContent=msg;el.classList.add('show');}}
function safe(fn,fallback){try{return fn();}catch(e){console.error(e);showFatal(e.message||String(e));return fallback;}}
function uid(){if(window.crypto&&crypto.randomUUID)return crypto.randomUUID();return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,function(c){var r=Math.random()*16|0,v=c==='x'?r:(r&3|8);return v.toString(16)})}
function iso(d){var x=new Date(d);x.setMinutes(x.getMinutes()-x.getTimezoneOffset());return x.toISOString().slice(0,10)}
function niceDate(d){return new Date(d+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});}

function normReg(s){return String(s||'').toUpperCase().replace(/\s+/g,'').slice(0,10)}

function merge(base,extra){for(var k in extra){if(extra&&Object.prototype.hasOwnProperty.call(extra,k)){if(extra[k]&&typeof extra[k]==='object'&&!Array.isArray(extra[k])&&base[k]) base[k]=merge(base[k],extra[k]); else base[k]=extra[k];}} return base;}
function selectedIso(){return iso(selectedDate)}
function ensureSupabase(cb){
  if(window.supabase){cb(true);return;}
  var existing=document.getElementById('supabaseScript');
  if(existing){existing.addEventListener('load',function(){cb(true)});existing.addEventListener('error',function(){cb(false)});return;}
  var s=document.createElement('script');s.id='supabaseScript';s.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';s.async=true;s.onload=function(){cb(true)};s.onerror=function(){cb(false)};document.head.appendChild(s);
}
function connectSupabase(){
  remoteClient=null;
  if(!app.settings.supabaseUrl||!app.settings.supabaseAnonKey||!window.supabase) return false;
  try{remoteClient=window.supabase.createClient(app.settings.supabaseUrl,app.settings.supabaseAnonKey);return true;}catch(e){console.warn(e);return false;}
}
async function pullRemote(){
  if(!connectSupabase()) return;
  var tables=['jobs','customers','vehicles','tasks','invoices','service_records'];
  for(var i=0;i<tables.length;i++){
    var t=tables[i];
    try{var res=await remoteClient.from(t).select('*').limit(1000); if(!res.error && Array.isArray(res.data)){app[t==='service_records'?'serviceRecords':t]=res.data.map(fromRemote);}}
    catch(e){console.warn('Remote pull failed for '+t,e)}
  }
  try{var st=await remoteClient.from('workshop_settings').select('*').eq('id','main').single(); if(!st.error&&st.data&&st.data.value){app.settings=merge(app.settings,st.data.value)}}catch(e){}
  saveLocal();
}
function fromRemote(row){var r=Object.assign({},row); if(r.booking_date) r.booking_date=String(r.booking_date).slice(0,10); return r;}
async function upsertRemote(table,row){
  if(!remoteClient) return;
  try{var data=Object.assign({},row); await remoteClient.from(table).upsert(data,{onConflict:'id'});}catch(e){console.warn('Remote save failed',table,e)}
}
async function deleteRemote(table,id){if(!remoteClient)return; try{await remoteClient.from(table).delete().eq('id',id)}catch(e){console.warn(e)}}
async function saveAll(){saveLocal(); if(remoteClient){try{await remoteClient.from('workshop_settings').upsert({id:'main',value:app.settings,updated_at:new Date().toISOString()});}catch(e){}}}

function fieldInv(label,key,val,type){return '<div class="field"><label>'+label+'</label><input id="inv_'+key+'" type="'+(type||'text')+'" value="'+esc(val||'')+'"></div>'}
function lineHtml(l){return '<tr><td><select data-line-type><option '+(l.type==='Labour'?'selected':'')+'>Labour</option><option '+(l.type==='Parts'?'selected':'')+'>Parts</option><option '+(l.type==='MOT'?'selected':'')+'>MOT</option></select></td><td><textarea data-line-desc>'+esc(l.description||'')+'</textarea></td><td><select data-line-vat><option value="inc_vat" '+(l.vat_mode==='inc_vat'?'selected':'')+'>Inc VAT</option><option value="ex_vat" '+(l.vat_mode==='ex_vat'?'selected':'')+'>Ex VAT</option><option value="no_vat" '+(l.vat_mode==='no_vat'?'selected':'')+'>No VAT</option></select></td><td><input data-line-amount type="number" step="0.01" value="'+esc(l.amount||0)+'"></td></tr>'}
function gatherInvoice(id){var inv=app.invoices.find(function(x){return x.id===id})||{id:id};['customer_name','registration','vehicle','invoice_date'].forEach(function(k){inv[k]=document.getElementById('inv_'+k).value});inv.invoice_number=(inv.invoice_number||((app.settings.invoicePrefix||'VECTA')+'-'+String(app.settings.nextInvoiceNumber||1).padStart(5,'0')));inv.lines=[].slice.call(document.querySelectorAll('#invoiceLines tr')).map(function(tr){return {type:tr.querySelector('[data-line-type]').value,description:tr.querySelector('[data-line-desc]').value,vat_mode:tr.querySelector('[data-line-vat]').value,amount:Number(tr.querySelector('[data-line-amount]').value||0)}});var totals=invoiceTotals(inv.lines);inv.subtotal=totals.subtotal;inv.vat=totals.vat;inv.total=totals.total;inv.status='saved';return inv}
function invoiceTotals(lines){var rate=Number(app.settings.vatRate||20)/100,sub=0,vat=0,total=0;lines.forEach(function(l){var a=Number(l.amount||0); if(l.vat_mode==='ex_vat'){sub+=a;vat+=a*rate;total+=a*(1+rate)}else if(l.vat_mode==='inc_vat'){total+=a;sub+=a/(1+rate);vat+=a-a/(1+rate)}else{sub+=a;total+=a}});return {subtotal:sub,vat:vat,total:total}}
function calcInvoice(){var lines=[].slice.call(document.querySelectorAll('#invoiceLines tr')).map(function(tr){return {vat_mode:tr.querySelector('[data-line-vat]').value,amount:Number(tr.querySelector('[data-line-amount]').value||0)}});var t=invoiceTotals(lines);var el=document.getElementById('invoiceSummary');if(el)el.innerHTML='<div><span>Subtotal</span><b>'+money(t.subtotal)+'</b></div><div><span>VAT</span><b>'+money(t.vat)+'</b></div><div><span>Total</span><b>'+money(t.total)+'</b></div>'}
function saveInvoice(id){var inv=gatherInvoice(id);var ix=app.invoices.findIndex(function(x){return x.id===id});if(ix>=0)app.invoices[ix]=inv;else{app.invoices.push(inv);app.settings.nextInvoiceNumber=Number(app.settings.nextInvoiceNumber||1)+1}saveAll();upsertRemote('invoices',inv);closeModals();render()}

function filteredPlannerJobs(type,name){var jobs=jobsForDate().sort(byTime);if(type==='ramp')return jobs.filter(function(j){return String(j.ramp||'')===String(name)});if(type==='technician')return jobs.filter(function(j){return String(j.technician||'')===String(name)});return jobs}
function openPlannerFilter(type,name){var jobs=filteredPlannerJobs(type,name);var title=(type==='ramp'?name+' Ramp':name)+' - '+niceDate(selectedIso());var total=jobs.reduce(function(a,j){return a+Number(j.estimated_hours||1)},0);var rows=jobs.length?jobs.map(function(j){return '<tr data-open-job="'+esc(j.id)+'"><td><b>'+esc(timeRange(j))+'</b></td><td><span class="plate">'+esc(j.registration||'NO REG')+'</span></td><td><b>'+esc(jobTitle(j))+'</b><br><span class="muted">'+esc(j.vehicle||'')+(j.customer_name?' · '+esc(j.customer_name):'')+'</span></td><td>'+esc(j.technician||'')+'</td><td>'+rampBadge(j.ramp)+'</td><td><span class="status '+esc(j.status||'booked')+'">'+statusText(j.status||'booked')+'</span></td></tr>'}).join(''):'<tr><td colspan="6" class="muted">No jobs booked for this '+(type==='ramp'?'ramp':'technician')+' today.</td></tr>';var html='<div class="modalCard"><div class="modalHead"><h2>'+esc(title)+'</h2><button class="btn" data-close-modal>Close</button></div><div class="modalBody"><div class="warn"><b>'+jobs.length+'</b> jobs · <b>'+total+'</b> hrs booked</div><table class="lineTable filterJobs"><thead><tr><th>Time</th><th>Reg</th><th>Job</th><th>Tech</th><th>Ramp</th><th>Status</th></tr></thead><tbody>'+rows+'</tbody></table></div><div class="modalFoot"><button class="btn" id="printFilterPage">Print This Page</button><button class="primary" data-close-modal>Done</button></div></div>';var m=document.getElementById('jobModal');m.innerHTML=html;m.classList.add('open');m.setAttribute('aria-hidden','false');m.querySelectorAll('[data-close-modal]').forEach(function(b){b.onclick=closeModals});m.querySelectorAll('[data-open-job]').forEach(function(r){r.onclick=function(){openJobModal(r.dataset.openJob)}});document.getElementById('printFilterPage').onclick=function(){printPlannerFilter(type,name)}}
function printPlannerFilter(type,name){var jobs=filteredPlannerJobs(type,name);var title=(type==='ramp'?name+' Ramp':name)+' - '+niceDate(selectedIso());var rows=jobs.map(function(j){return '<tr><td>'+esc(timeRange(j))+'</td><td><b>'+esc(j.registration||'')+'</b></td><td>'+esc(j.vehicle||'')+'<br>'+esc(jobTitle(j))+'</td><td>'+esc(j.customer_name||'')+'</td><td>'+esc(j.technician||'')+'</td><td>'+esc(j.ramp||'')+'</td><td>'+esc(statusText(j.status||'booked'))+'</td></tr>'}).join('')||'<tr><td colspan="7">No jobs booked.</td></tr>';document.getElementById('printSheet').innerHTML='<div class="printHead"><div><div class="printLogo">VECTA</div><div>Vehicle servicing and repairs</div></div><div class="printTitle">'+esc(title)+'</div></div><table class="printTable"><tr><th>Time</th><th>Reg</th><th>Job</th><th>Customer</th><th>Tech</th><th>Ramp</th><th>Status</th></tr>'+rows+'</table><div class="sign"><div class="signature">Notes</div><div class="signature">Manager sign-off</div></div>';window.print()}
function printDay(){var jobs=jobsForDate().sort(byTime);var html='<div class="printHead"><div><div class="printLogo">VECTA</div><div>Vehicle servicing and repairs</div></div><div class="printTitle">Daily Workshop Planner<br>'+niceDate(selectedIso())+'</div></div><div class="printGrid">'+(app.settings.mechanics||['Alfie','Jordan']).map(function(m){var mj=jobs.filter(function(j){return j.technician===m});return '<div class="printBox"><h2>'+esc(m)+'</h2><table class="printTable"><tr><th>Time</th><th>Reg</th><th>Work</th><th>Ramp</th></tr>'+mj.map(function(j){return '<tr><td>'+esc(j.drop_time||'')+'</td><td><b>'+esc(j.registration||'')+'</b></td><td>'+esc(j.vehicle||'')+'<br>'+esc(j.work_required||'')+'</td><td>'+esc(j.ramp||'')+'</td></tr>'}).join('')+'</table></div>'}).join('')+'</div><div class="sign"><div class="signature">Notes</div><div class="signature">Manager sign-off</div></div>';document.getElementById('printSheet').innerHTML=html;window.print()}
function printJob(j){document.getElementById('printSheet').innerHTML='<div class="printHead"><div><div class="printLogo">VECTA</div><div>Job Card</div></div><div class="printTitle">'+esc(j.registration||'')+'</div></div><div class="printGrid"><div class="printBox"><h3>Customer</h3>'+esc(j.customer_name||'')+'<br>'+esc(j.customer_phone||'')+'</div><div class="printBox"><h3>Vehicle</h3>'+esc(j.vehicle||'')+'<br>'+esc(j.booking_date||'')+' '+esc(j.drop_time||'')+'</div><div class="printBox"><h3>Work Required</h3>'+esc(j.work_required||'')+'</div><div class="printBox"><h3>Technician</h3>'+esc(j.technician||'')+' · '+esc(j.ramp||'')+'</div></div><div class="printBox" style="margin-top:10px;min-height:80px"><h3>Technician Notes</h3>'+esc(j.technician_notes||'')+'</div><div class="sign"><div class="signature">Technician signature</div><div class="signature">Customer / authorisation</div></div>';window.print()}
function printService(id){var j=app.jobs.find(function(x){return x.id===id});if(!j)return;var ops=['Engine oil replaced','Oil filter replaced','Air filter checked/replaced','Pollen filter checked/replaced','Fuel filter checked/replaced','Spark plugs replaced','Brake fluid checked','Coolant checked / topped up','Service indicator reset','Other / notes'];var health=['Windscreen','Wiper blades','Washer jets','Mirrors','Headlamps','Side lights','Indicators','Number plate lamps','Horn','Battery','Coolant','Brake fluid','Power steering','Belts','Suspension','Steering','Exhaust','Fuel lines','Brake pipes','Brake hoses'];var wheels=['Front Left','Front Right','Rear Left','Rear Right'];var opRows=ops.map(function(c){return '<tr><td class="checkbox">□</td><td>'+esc(c)+'</td><td></td></tr>'}).join('');var healthRows=health.map(function(c){return '<tr><td class="checkbox">□</td><td>'+esc(c)+'</td><td></td></tr>'}).join('');var brakeRows=wheels.map(function(w){return '<tr><td>'+w+'</td><td></td><td></td></tr>'}).join('');var tyreRows=wheels.map(function(w){return '<tr><td>'+w+'</td><td></td><td></td><td>□ Good&nbsp;&nbsp;□ Fair&nbsp;&nbsp;□ Poor</td></tr>'}).join('');document.getElementById('printSheet').innerHTML='<div class="servicePrint"><div class="printHead"><div><span class="nmukBadge">For all employees of NMUK</span><div class="printLogo">VECTA</div><div class="mutedPrint">Vehicle Servicing and repairs</div></div><div class="printTitle">SERVICE SHEET<br><span style="font-size:14px">'+esc(j.registration||'')+'</span></div></div><div class="topInfo"><div class="printBox"><h3>Vehicle Details</h3><b>Registration:</b> '+esc(j.registration||'')+'<br><b>Make / Model:</b> '+esc(j.vehicle||'')+'<br><b>Mileage:</b> __________________</div><div class="printBox"><h3>Customer Details</h3><b>Name:</b> '+esc(j.customer_name||'')+'<br><b>Phone:</b> '+esc(j.customer_phone||'')+'<br><b>Email:</b> '+esc(j.customer_email||'')+'</div><div class="printBox"><h3>Service Details</h3><b>Date:</b> '+esc(j.booking_date||selectedIso())+'<br><b>Technician:</b> '+esc(j.technician||'')+'<br><b>Type:</b> '+esc(j.job_type||'Service')+'</div></div><div class="printBox" style="margin-bottom:4px"><h3>Pre-Service Inspection</h3><div class="preGrid"><div><b>Lights on dash?</b><div class="miniLine"></div></div><div><b>Oil level</b><div class="miniLine"></div></div><div><b>Bodywork damage</b><div class="miniLine"></div></div><div><b>Any other observations</b><div class="miniLine"></div></div></div></div><div class="main3"><div class="stack"><div class="printBox"><h3>1. Service Operations</h3><table class="compact"><tr><th>OK</th><th>Item</th><th>Notes</th></tr>'+opRows+'</table></div><div class="printBox"><h3>Oil Details</h3>Spec: _______________ Qty: ______ Brand: _______________</div><div class="printBox"><h3>Road Test</h3><div>□ Steering &nbsp; □ Brakes &nbsp; □ Clutch &nbsp; □ Gear selection &nbsp; □ Warning lights &nbsp; □ Noise / vibration</div><div class="lineArea small"></div></div></div><div class="stack"><div class="printBox"><h3>2. Vehicle Health Check</h3><table class="tiny"><tr><th>OK</th><th>Item</th><th>Notes</th></tr>'+healthRows+'</table></div></div><div class="stack"><div class="printBox"><h3>3. Brake Measurements</h3><table class="compact"><tr><th>Wheel</th><th>Pad mm</th><th>Disc mm / Condition</th></tr>'+brakeRows+'</table></div><div class="printBox"><h3>4. Tyre Measurements</h3><table class="compact"><tr><th>Wheel</th><th>Tread mm</th><th>PSI</th><th>Condition</th></tr>'+tyreRows+'</table></div><div class="printBox"><h3>5. Customer Advisories</h3><div class="lineArea tall"></div></div><div class="printBox"><h3>6. Technician Notes</h3><div class="lineArea small"></div></div></div></div><div class="sign"><div class="signature">Technician signature</div><div class="signature">Customer signature</div><div class="signature">Completion time</div></div><div class="footer">Thank you for choosing Vecta – Vehicle Servicing and repairs</div></div>';window.print()}
function printInvoice(inv){var rows=(inv.lines||[]).map(function(l){return '<tr><td>'+esc(l.type||'')+'</td><td>'+esc(l.description||'')+'</td><td>'+esc(l.vat_mode||'')+'</td><td>'+money(l.amount||0)+'</td></tr>'}).join('');document.getElementById('printSheet').innerHTML='<div class="printHead"><div><div class="printLogo">VECTA</div><div>'+esc(app.settings.businessName||'Vecta Motors')+'</div></div><div class="printTitle">INVOICE<br>'+esc(inv.invoice_number||'')+'</div></div><div class="printGrid"><div class="printBox"><h3>Invoice To</h3>'+esc(inv.customer_name||'')+'<br>'+esc(inv.registration||'')+'<br>'+esc(inv.vehicle||'')+'</div><div class="printBox"><h3>Date</h3>'+esc(inv.invoice_date||'')+'</div></div><table class="printTable"><tr><th>Type</th><th>Description</th><th>VAT</th><th>Amount</th></tr>'+rows+'</table><div class="printBox noBreak" style="margin-top:10px;margin-left:auto;width:260px"><b>Subtotal:</b> '+money(inv.subtotal||0)+'<br><b>VAT:</b> '+money(inv.vat||0)+'<br><b>Total:</b> '+money(inv.total||0)+'</div><div class="printBox noBreak" style="margin-top:10px"><h3>Payment Details</h3>Bank: '+esc(app.settings.bankName||'')+'<br>Account: '+esc(app.settings.accountName||'')+'<br>Sort code: '+esc(app.settings.sortCode||'')+'<br>Account number: '+esc(app.settings.accountNumber||'')+'<br>Reference: '+esc(inv.registration||'')+'</div>';window.print()}
init();
