<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vecta Planner 2.0</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0f172a;--panel:#111827;--card:#1f2937;--line:#334155;--text:#f8fafc;--muted:#94a3b8;--gold:#d4af37;--danger:#ef4444;--ok:#22c55e;--blue:#38bdf8}*{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:linear-gradient(135deg,#0f172a,#111827);color:var(--text)}header{display:flex;justify-content:space-between;align-items:center;padding:18px 24px;border-bottom:1px solid var(--line);background:rgba(15,23,42,.95);position:sticky;top:0;z-index:5}.brand{font-weight:800;letter-spacing:.06em}.brand span{color:var(--gold)}.status{font-size:13px;padding:8px 12px;border-radius:999px;border:1px solid var(--line);color:var(--muted)}.status.ok{color:#052e16;background:#dcfce7;border-color:#86efac}.status.bad{color:#7f1d1d;background:#fee2e2;border-color:#fecaca}.wrap{display:grid;grid-template-columns:245px 1fr;min-height:calc(100vh - 70px)}nav{border-right:1px solid var(--line);padding:18px;background:rgba(17,24,39,.9)}nav button{width:100%;text-align:left;margin:0 0 8px;padding:13px 14px;border:1px solid transparent;border-radius:14px;background:transparent;color:var(--muted);font-weight:700;cursor:pointer}nav button.active,nav button:hover{background:var(--card);color:var(--text);border-color:var(--line)}main{padding:24px}.hero{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:18px}.h1{font-size:28px;font-weight:850;margin:0}.sub{color:var(--muted);margin-top:5px}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}.card{background:rgba(31,41,55,.84);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 20px 50px rgba(0,0,0,.18)}.stat{font-size:28px;font-weight:850}.muted{color:var(--muted)}.two{display:grid;grid-template-columns:1fr 1fr;gap:16px}.three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}input,select,textarea{width:100%;background:#0b1220;color:var(--text);border:1px solid var(--line);border-radius:12px;padding:12px;margin:5px 0 11px}label{font-size:12px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em}button.primary{background:var(--gold);color:#111827;border:0;padding:12px 16px;border-radius:12px;font-weight:850;cursor:pointer}button.secondary{background:#0b1220;color:var(--text);border:1px solid var(--line);padding:12px 16px;border-radius:12px;font-weight:800;cursor:pointer}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.table{width:100%;border-collapse:collapse}.table th,.table td{padding:12px;border-bottom:1px solid var(--line);text-align:left}.table th{color:var(--muted);font-size:12px;text-transform:uppercase}.pill{font-size:12px;padding:5px 9px;border-radius:999px;background:#0b1220;border:1px solid var(--line);color:var(--muted)}.pill.booked{color:#bfdbfe;border-color:#1d4ed8}.pill.progress{color:#fde68a;border-color:#92400e}.pill.done{color:#bbf7d0;border-color:#166534}.danger{color:var(--danger)}.hidden{display:none!important}.notice{border:1px solid #92400e;background:#451a03;color:#fed7aa;padding:14px;border-radius:14px;margin-bottom:18px}.jobcard{border-left:4px solid var(--gold);margin:10px 0;padding:14px;background:#0b1220;border-radius:14px}.reg{display:inline-block;background:#facc15;color:#111827;padding:4px 8px;border-radius:5px;font-weight:900;letter-spacing:.06em}@media(max-width:900px){.wrap{grid-template-columns:1fr}nav{display:flex;overflow:auto;border-right:0;border-bottom:1px solid var(--line)}nav button{white-space:nowrap}.grid,.two,.three{grid-template-columns:1fr}header{align-items:flex-start;gap:10px;flex-direction:column}}
</style>
</head>
<body>
<header><div class="brand">VECTA <span>PLANNER 2.0</span></div><div id="connStatus" class="status bad">Supabase not connected</div></header>
<div class="wrap"><nav>
<button data-view="dashboard" class="active">Dashboard</button><button data-view="planner">Workshop Planner</button><button data-view="customers">Customers</button><button data-view="vehicles">Vehicles</button><button data-view="jobs">Jobs</button><button data-view="invoices">Invoices</button><button data-view="settings">Settings</button>
</nav><main id="app"></main></div>
<script>
const $=s=>document.querySelector(s);let sb=null;let state={customers:[],vehicles:[],jobs:[],invoices:[]};
function getConfig(){return {url:localStorage.getItem('vecta_supabase_url')||'',key:localStorage.getItem('vecta_supabase_key')||''}}
function setStatus(ok,msg){const el=$('#connStatus');el.textContent=msg;el.className='status '+(ok?'ok':'bad')}
function initSupabase(){const c=getConfig(); if(c.url&&c.key&&window.supabase){sb=window.supabase.createClient(c.url,c.key); setStatus(true,'Supabase connected'); return true}else{sb=null;setStatus(false,'Supabase not connected');return false}}
function nav(v){document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active',b.dataset.view===v)); render(v)}
document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>nav(b.dataset.view));
async function load(){if(!initSupabase())return; const [c,v,j,i]=await Promise.all([sb.from('customers').select('*').order('created_at',{ascending:false}),sb.from('vehicles').select('*').order('created_at',{ascending:false}),sb.from('jobs').select('*').order('booked_date',{ascending:true}),sb.from('invoices').select('*').order('created_at',{ascending:false})]); if(c.error||v.error||j.error){alert('Supabase error: '+(c.error||v.error||j.error).message);return} state={customers:c.data||[],vehicles:v.data||[],jobs:j.data||[],invoices:i.data||[]};}
function needDb(){return `<div class="notice"><b>Database required.</b> This version will not save locally or use fake demo jobs. Go to Settings and connect Supabase before live use.</div>`}
function custName(id){return state.customers.find(x=>x.id===id)?.name||'—'} function vehReg(id){return state.vehicles.find(x=>x.id===id)?.registration||'—'}
async function render(view='dashboard'){await load(); if(!sb && view!=='settings'){$('#app').innerHTML=needDb()+settingsHtml();return} const map={dashboard,planner,customers,vehicles,jobs,invoices,settings}; $('#app').innerHTML=map[view](); bind(view)}
function dashboard(){return `<div class="hero"><div><h1 class="h1">Workshop Control</h1><div class="sub">Live data only. No demo records. No local garage data.</div></div><button class="primary" onclick="nav('jobs')">Add Job</button></div><div class="grid"><div class="card"><div class="muted">Customers</div><div class="stat">${state.customers.length}</div></div><div class="card"><div class="muted">Vehicles</div><div class="stat">${state.vehicles.length}</div></div><div class="card"><div class="muted">Open Jobs</div><div class="stat">${state.jobs.filter(j=>j.status!=='done').length}</div></div><div class="card"><div class="muted">Today</div><div class="stat">${state.jobs.filter(j=>j.booked_date===new Date().toISOString().slice(0,10)).length}</div></div></div><div class="card" style="margin-top:16px"><h2>Today’s Jobs</h2>${jobList(state.jobs.filter(j=>j.booked_date===new Date().toISOString().slice(0,10)))}</div>`}
function planner(){let by={booked:[],progress:[],done:[]};state.jobs.forEach(j=>(by[j.status]||by.booked).push(j));return `<div class="hero"><div><h1 class="h1">Workshop Planner</h1><div class="sub">Drag-and-drop comes later. For now use job status.</div></div></div><div class="three"><div class="card"><h2>Booked In</h2>${jobList(by.booked)}</div><div class="card"><h2>In Progress</h2>${jobList(by.progress)}</div><div class="card"><h2>Completed</h2>${jobList(by.done)}</div></div>`}
function jobList(arr){return arr.length?arr.map(j=>`<div class="jobcard"><div class="row"><span class="reg">${vehReg(j.vehicle_id)}</span><span class="pill ${j.status==='progress'?'progress':j.status==='done'?'done':'booked'}">${j.status}</span></div><b>${j.title}</b><div class="muted">${custName(j.customer_id)} · ${j.booked_date||''} ${j.start_time||''}</div><div class="muted">${j.description||''}</div></div>`).join(''):'<div class="muted">No records.</div>'}
function customers(){return `<div class="hero"><div><h1 class="h1">Customers</h1><div class="sub">Create a customer first, then add vehicle/job.</div></div></div><div class="two"><div class="card"><h2>Add customer</h2><form id="customerForm"><label>Name</label><input name="name" required><label>Phone</label><input name="phone"><label>Email</label><input name="email"><label>Department</label><input name="department"><button class="primary">Save to Supabase</button></form></div><div class="card"><h2>Customer list</h2>${table(['Name','Phone','Email'],state.customers.map(c=>[c.name,c.phone||'',c.email||'']))}</div></div>`}
function vehicles(){return `<div class="two"><div class="card"><h2>Add vehicle</h2><form id="vehicleForm"><label>Customer</label><select name="customer_id">${opts(state.customers,'name')}</select><label>Registration</label><input name="registration" required style="text-transform:uppercase"><label>Make</label><input name="make"><label>Model</label><input name="model"><label>Mileage</label><input name="mileage" type="number"><button class="primary">Save to Supabase</button></form></div><div class="card"><h2>Vehicles</h2>${table(['Reg','Customer','Vehicle'],state.vehicles.map(v=>[`<span class="reg">${v.registration}</span>`,custName(v.customer_id),`${v.make||''} ${v.model||''}`]))}</div></div>`}
function jobs(){return `<div class="two"><div class="card"><h2>Add job</h2><form id="jobForm"><label>Customer</label><select name="customer_id">${opts(state.customers,'name')}</select><label>Vehicle</label><select name="vehicle_id">${state.vehicles.map(v=>`<option value="${v.id}">${v.registration} - ${v.make||''} ${v.model||''}</option>`).join('')}</select><label>Job title</label><input name="title" required placeholder="Service, MOT, brakes, diagnostics"><label>Description</label><textarea name="description"></textarea><div class="two"><div><label>Date</label><input name="booked_date" type="date" value="${new Date().toISOString().slice(0,10)}"></div><div><label>Status</label><select name="status"><option value="booked">Booked</option><option value="progress">In Progress</option><option value="done">Done</option></select></div></div><label>Price</label><input name="price" type="number" step="0.01"><button class="primary">Save to Supabase</button></form></div><div class="card"><h2>Jobs</h2>${jobList(state.jobs)}</div></div>`}
function invoices(){return `<div class="card"><h1 class="h1">Invoices</h1><p class="muted">Invoice module foundation is ready. Full invoice builder comes after job/customer/vehicle flow is proven stable.</p>${table(['Number','Customer','Total','Status'],state.invoices.map(i=>[i.invoice_number||'Draft',custName(i.customer_id),'£'+(i.total||0),i.status||'draft']))}</div>`}
function settings(){return settingsHtml()}
function settingsHtml(){const c=getConfig();return `<div class="card"><h1 class="h1">Settings</h1><p class="muted">Paste your Supabase project URL and anon public key once. These are saved in this browser only.</p><form id="settingsForm"><label>Supabase Project URL</label><input name="url" value="${c.url}" placeholder="https://xxxx.supabase.co"><label>Supabase anon public key</label><textarea name="key" rows="4" placeholder="eyJhbGciOi...">${c.key}</textarea><button class="primary">Save connection</button> <button type="button" class="secondary" id="testBtn">Test connection</button></form><hr style="border-color:var(--line)"><p class="danger"><b>Production rule:</b> do not enter real customer data until one fake job appears in Supabase tables.</p></div>`}
function opts(arr,label){return arr.map(x=>`<option value="${x.id}">${x[label]||x.id}</option>`).join('')}
function table(head,rows){if(!rows.length)return '<div class="muted">No records.</div>';return `<table class="table"><thead><tr>${head.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table>`}
function formObj(f){return Object.fromEntries(new FormData(f).entries())}
function bind(view){let f;if(f=$('#settingsForm')){f.onsubmit=e=>{e.preventDefault();let o=formObj(f);localStorage.setItem('vecta_supabase_url',o.url.trim());localStorage.setItem('vecta_supabase_key',o.key.trim());alert('Connection saved. Now test with one fake record.');render('dashboard')};$('#testBtn').onclick=async()=>{initSupabase();if(!sb)return alert('Missing URL/key');const r=await sb.from('customers').select('id').limit(1);alert(r.error?'Failed: '+r.error.message:'Connected successfully')}}
if(f=$('#customerForm'))f.onsubmit=async e=>{e.preventDefault();let r=await sb.from('customers').insert(formObj(f)); if(r.error)alert(r.error.message); else render('customers')};
if(f=$('#vehicleForm'))f.onsubmit=async e=>{e.preventDefault();let o=formObj(f); o.registration=(o.registration||'').toUpperCase(); if(o.mileage==='')delete o.mileage; let r=await sb.from('vehicles').insert(o); if(r.error)alert(r.error.message); else render('vehicles')};
if(f=$('#jobForm'))f.onsubmit=async e=>{e.preventDefault();let o=formObj(f); if(o.price==='')delete o.price; let r=await sb.from('jobs').insert(o); if(r.error)alert(r.error.message); else render('planner')};}
render('dashboard');
</script>
</body></html>
