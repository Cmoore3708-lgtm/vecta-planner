function printWhenImagesReady(){
  var root=document.getElementById('printSheet');
  var images=root?Array.prototype.slice.call(root.querySelectorAll('img')):[];
  var waits=images.map(function(img){
    if(img.complete&&img.naturalWidth>0)return Promise.resolve();
    return new Promise(function(resolve){
      var settled=false;
      function done(){if(settled)return;settled=true;resolve();}
      img.addEventListener('load',done,{once:true});
      img.addEventListener('error',done,{once:true});
      if(typeof img.decode==='function')img.decode().then(done).catch(function(){});
      setTimeout(done,2500);
    });
  });
  Promise.all(waits).then(function(){
    requestAnimationFrame(function(){requestAnimationFrame(function(){window.print();});});
  });
}

    try{var res=await remoteClient.from(t).select('*').limit(1000); if(!res.error && Array.isArray(res.data)){app[t==='service_records'?'serviceRecords':t]=res.data.map(fromRemote);}}

function taskMeta(t){var d={priority:'normal',due:'',notes:'',pinned:false,allocated:false,allocated_to:'',allocated_time:'',mini_job_id:''};try{if(t.priority&&String(t.priority).charAt(0)==='{')d=Object.assign(d,JSON.parse(t.priority));else if(t.priority)d.priority=t.priority==='urgent'?'high':(t.priority==='today'?'normal':t.priority)}catch(e){}return d}
function packTaskMeta(m){return JSON.stringify({priority:m.priority||'normal',due:m.due||'',notes:m.notes||'',pinned:!!m.pinned,allocated:!!m.allocated,allocated_to:m.allocated_to||'',allocated_time:m.allocated_time||'',mini_job_id:m.mini_job_id||''})}
function taskDueLabel(d){if(!d)return 'No deadline';if(d===todayIso())return 'Today';var tomorrow=new Date();tomorrow.setDate(tomorrow.getDate()+1);if(d===iso(tomorrow))return 'Tomorrow';return niceDate(d)}
function extractTaskReg(text){var m=String(text||'').toUpperCase().match(/\b[A-Z]{1,3}\d{1,4}\s?[A-Z]{1,3}\b/g);return m?normReg(m[m.length-1]):''}
function taskSort(a,b){var A=taskMeta(a),B=taskMeta(b);if(A.pinned!==B.pinned)return A.pinned?-1:1;var pd={high:0,normal:1,low:2};if((pd[A.priority]||1)!==(pd[B.priority]||1))return (pd[A.priority]||1)-(pd[B.priority]||1);return String(A.due||'9999').localeCompare(String(B.due||'9999'))}
function openTaskModal(id){var existing=id?app.tasks.find(function(x){return x.id===id}):null;var t=existing?Object.assign({},existing):{id:uid(),task_text:'',priority:packTaskMeta({priority:'normal'}),done:false,sort_order:0,created_at:new Date().toISOString()};var m=taskMeta(t);var html='<div class="modalCard taskModalCard"><div class="modalHead"><h2>'+(existing?'Edit Task':'New Task')+'</h2><button class="btn" data-close-modal>Close</button></div><div class="modalBody"><div class="formGrid"><div class="field wide"><label>Task</label><input id="task_text" autofocus value="'+esc(t.task_text||'')+'"></div><div class="field"><label>Deadline (optional)</label><input id="task_due" type="date" value="'+esc(m.due||'')+'"></div><div class="field"><label>Priority</label><select id="task_priority"><option value="high" '+(m.priority==='high'?'selected':'')+'>High</option><option value="normal" '+(m.priority==='normal'?'selected':'')+'>Normal</option><option value="low" '+(m.priority==='low'?'selected':'')+'>Low</option></select></div><div class="field wide"><label>Notes (optional)</label><textarea id="task_notes">'+esc(m.notes||'')+'</textarea></div><label class="wide"><input id="task_pinned" type="checkbox" '+(m.pinned?'checked':'')+'> Pin this task to the top</label></div></div><div class="modalFoot">'+(existing?'<button class="danger" id="deleteTask">Delete</button>':'')+'<button class="primary" id="saveTask">Save Task</button></div></div>';var modal=document.getElementById('jobModal');modal.innerHTML=html;modal.classList.add('open');modal.setAttribute('aria-hidden','false');modal.querySelector('[data-close-modal]').onclick=closeModals;document.getElementById('saveTask').onclick=function(){var text=document.getElementById('task_text').value.trim();if(!text)return alert('Enter a task.');m.priority=document.getElementById('task_priority').value;m.due=document.getElementById('task_due').value;m.notes=document.getElementById('task_notes').value.trim();m.pinned=document.getElementById('task_pinned').checked;t.task_text=text;t.priority=packTaskMeta(m);var ix=app.tasks.findIndex(function(x){return x.id===t.id});if(ix>=0)app.tasks[ix]=t;else app.tasks.push(t);saveAll();upsertRemote('tasks',t);closeModals();render()};var del=document.getElementById('deleteTask');if(del)del.onclick=function(){if(!confirm('Delete this task?'))return;app.tasks=app.tasks.filter(function(x){return x.id!==t.id});var mini=app.jobs.find(function(j){return j.source==='task:'+t.id});if(mini){mini.archived=true;upsertRemote('jobs',mini)}saveAll();deleteRemote('tasks',t.id);closeModals();render()}}
function syncTaskFromMiniJob(j){if(!j||String(j.source||'').indexOf('task:')!==0)return;var id=String(j.source).slice(5),t=app.tasks.find(function(x){return x.id===id});if(!t)return;var m=taskMeta(t);m.allocated=true;m.allocated_to=j.technician||'';m.allocated_time=j.drop_time||'';m.mini_job_id=j.id;t.priority=packTaskMeta(m);if(j.status==='completed')t.done=true;upsertRemote('tasks',t)}
function createMiniTaskFromDrop(t,tech,time){var m=taskMeta(t),reg=extractTaskReg(t.task_text),work=t.task_text;if(reg)work=work.replace(new RegExp(reg.replace(/\s/g,'\s?'),'i'),'').replace(/^\s*[-–:]?\s*|\s*[-–:]?\s*$/g,'')||t.task_text;var duration=Number(prompt('How many minutes should this task take?','30'));if(!duration||duration<5)return;var j={id:uid(),booking_date:selectedIso(),card_type:'mini_task',registration:reg,vehicle:'Internal Task',work_required:work,customer_name:'',customer_phone:'',customer_email:'',customer_note:m.notes||'',drop_time:time,technician:tech,ramp:'',status:'booked',job_type:'mini_task',job_colour:'mini_task',estimated_hours:Math.max(.25,Math.round((duration/60)*4)/4),source:'task:'+t.id,sort_order:0,archived:false,created_at:new Date().toISOString(),updated_at:new Date().toISOString()};app.jobs.push(j);m.allocated=true;m.allocated_to=tech;m.allocated_time=time;m.mini_job_id=j.id;t.priority=packTaskMeta(m);saveAll();upsertRemote('jobs',j);upsertRemote('tasks',t);render()}
